<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Manager</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  background: #0d1117; color: #c9d1d9; min-height: 100vh;
}
.container { max-width: 640px; margin: 0 auto; padding: 20px; }
h1 { text-align: center; color: #58a6ff; margin-bottom: 8px; font-size: 22px; }
.subtitle { text-align: center; color: #8b949e; margin-bottom: 24px; font-size: 13px; }

/* Tabs */
.tabs { display: flex; gap: 4px; margin-bottom: 20px; flex-wrap: wrap; }
.tab {
  flex: 1; min-width: 70px; padding: 9px 4px; text-align: center;
  border: 1px solid #30363d; border-radius: 8px; cursor: pointer;
  background: #161b22; color: #8b949e; font-size: 13px; transition: all 0.2s;
}
.tab.active { background: #1f6feb; color: #fff; border-color: #1f6feb; }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* Form */
.form-group { margin-bottom: 16px; }
.form-group label { display: block; color: #8b949e; font-size: 13px; margin-bottom: 6px; }
.form-group input, .form-group select {
  width: 100%; padding: 10px 12px; background: #161b22; border: 1px solid #30363d;
  border-radius: 8px; color: #c9d1d9; font-size: 15px; outline: none;
}
.form-group input:focus, .form-group select:focus { border-color: #1f6feb; }
.form-group select { cursor: pointer; appearance: auto; }
.form-group .hint { font-size: 11px; color: #6e7681; margin-top: 4px; }

.row { display: flex; gap: 12px; }
.row .form-group { flex: 1; }

.btn {
  width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 15px;
  font-weight: 600; cursor: pointer; transition: all 0.2s; margin-top: 8px;
}
.btn-primary { background: #238636; color: #fff; }
.btn-primary:hover { background: #2ea043; }
.btn-primary:disabled { background: #1a3a1a; color: #4a8c4a; cursor: not-allowed; }
.btn-danger { background: #da3633; color: #fff; }
.btn-danger:hover { background: #e5534b; }
.btn-danger:disabled { background: #3a1a1a; color: #8c4a4a; cursor: not-allowed; }
.btn-blue { background: #1f6feb; color: #fff; }
.btn-blue:hover { background: #388bfd; }
.btn-blue:disabled { background: #1a2a4a; color: #4a6a8c; cursor: not-allowed; }

/* Info box */
.info-box {
  padding: 12px; background: #161b22; border: 1px solid #30363d;
  border-radius: 8px; margin-bottom: 16px; display: none;
}
.info-box.show { display: block; }
.info-box .name { color: #58a6ff; font-weight: 600; }
.info-box .price { color: #3fb950; }
.info-box .error { color: #f85149; }

/* Holding cards */
.holding-card {
  background: #161b22; border: 1px solid #30363d; border-radius: 8px;
  padding: 12px; margin-bottom: 8px;
}
.holding-card .header { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
.holding-card .symbol { color: #58a6ff; font-weight: 700; font-size: 15px; }
.holding-card .detail { color: #8b949e; font-size: 13px; margin-top: 4px; }
.holding-card .btn-sm {
  background: none; padding: 4px 10px; border-radius: 6px; font-size: 12px; cursor: pointer;
  border: 1px solid #da3633; color: #da3633;
}
.holding-card .btn-sm:hover { background: #da3633; color: #fff; }

/* Cash edit row */
.cash-row { display: flex; gap: 8px; align-items: center; margin-top: 8px; }
.cash-row input { width: 120px; padding: 6px 8px; background: #161b22; border: 1px solid #30363d;
  border-radius: 6px; color: #c9d1d9; font-size: 14px; outline: none; }
.cash-row button { padding: 6px 12px; border: none; border-radius: 6px; font-size: 12px;
  font-weight: 600; cursor: pointer; background: #238636; color: #fff; }

/* Chart area */
.chart-area { margin-top: 16px; text-align: center; }
.chart-area img { max-width: 100%; border-radius: 8px; margin-bottom: 12px; }

/* Toast */
.toast {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  padding: 12px 24px; border-radius: 8px; font-size: 14px; font-weight: 600;
  z-index: 1000; display: none; max-width: 90%;
}
.toast.success { background: #238636; color: #fff; }
.toast.error { background: #da3633; color: #fff; }
.toast.show { display: block; animation: fadeInOut 3s ease; }
@keyframes fadeInOut {
  0% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
  15% { opacity: 1; transform: translateX(-50%) translateY(0); }
  85% { opacity: 1; }
  100% { opacity: 0; }
}

.spinner {
  display: inline-block; width: 16px; height: 16px;
  border: 2px solid #fff; border-top-color: transparent;
  border-radius: 50%; animation: spin 0.6s linear infinite;
  vertical-align: middle; margin-right: 6px;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>

<body>

<div class="container">

      <div id="stock-dropdown" style="display:none;position:absolute;left:0;right:0;top:100%;z-index:10;background:#161b22;border:1px solid #30363d;border-radius:8px;max-height:200px;overflow-y:auto;"></div>
    </div>
    <div id="stock-search-result" class="info-box"></div>
    <div class="row">
      <div class="form-group">
        <label>Shares</label>
        <input type="number" id="stock-shares" step="0.01" min="0.01" placeholder="e.g. 1.5">
      </div>
      <div class="form-group">
        <label>Cost Price (USD)</label>
        <input type="number" id="stock-cost" step="0.01" min="0" placeholder="e.g. 178.45">
      </div>
    </div>
    <button class="btn btn-primary" id="btn-add-stock" onclick="addStock()">Add Stock Position</button>
  </div>

  <!-- Sell Stock Tab -->
  <div id="tab-sell" class="tab-content">

      <label>Select Stock to Sell</label>
      <select id="sell-symbol" onchange="onSellSymbolChange()">
        <option value="">-- Loading --</option>
      </select>
    </div>
    <div id="sell-info" class="info-box"></div>
    <div class="row">
      <div class="form-group">
        <label>Shares to Sell</label>
        <input type="number" id="sell-shares" step="0.01" min="0.01" placeholder="e.g. 0.5"
               oninput="previewSellPnL()">
      </div>
      <div class="form-group">
        <label>Sell Price (USD)</label>
        <input type="number" id="sell-price" step="0.01" min="0" placeholder="e.g. 195.00"
               oninput="previewSellPnL()">
      </div>
    </div>
    <div id="sell-pnl-preview" class="info-box" style="border-color:#f39c12;"></div>
    <button class="btn btn-danger" id="btn-sell-stock" onclick="sellStock()">Sell Stock</button>
  </div>

  <!-- Buy Gold Tab -->
  <div id="tab-gold" class="tab-content">
    <div class="form-group">
      <label>Gold Product Name</label>
      <input type="text" id="gold-name" placeholder="e.g. 浙商银行积存金">
      <div class="hint">自定义名称，不需要对应API，黄金价格统一用国际金价计算</div>
    </div>
    <div class="row">

        <label>Grams</label>

      </div>
      <div class="form-group">
        <label>Cost (CNY/gram)</label>
        <input type="number" id="gold-cost" step="0.01" min="0" placeholder="e.g. 1194.91">

  </div>

  <!-- Sell Gold Tab -->
  <div id="tab-sellgold" class="tab-content">
    <div class="form-group">
      <label>Select Gold to Sell</label>
      <select id="sellgold-name" onchange="onSellGoldChange()">
        <option value="">-- Loading --</option>
      </select>
    </div>
    <div id="sellgold-info" class="info-box"></div>
    <div class="row">
      <div class="form-group">
        <label>Grams to Sell</label>
        <input type="number" id="sellgold-grams" step="0.0001" min="0.0001" placeholder="e.g. 0.5"

      </div>
      <div class="form-group">
        <label>Sell Price (CNY/gram)</label>
        <input type="number" id="sellgold-price" step="0.01" min="0" placeholder="e.g. 1200"

    </div>

<div id="toast" class="toast"></div>

<script>
const REPO_OWNER = "JacekCoder";
const REPO_NAME = "Deposit_analysis";
const API_BASE = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}`;

// ── Profile support ──────────────────────────────────────────────────────
const urlParams = new URLSearchParams(window.location.search);
const PROFILE_KEY = urlParams.get("profile") || "default";
let PROFILE = { portfolio_file: "portfolio.json", history_file: "history.json", chart_prefix: "chart", label: "Portfolio Manager", webhook_url: "" };
let profilesConfig = null;

async function loadProfiles() {
  try {
    const resp = await fetch(`${API_BASE}/contents/profiles.json`, {
      headers: { Authorization: `token ${getToken()}` }
    });
    if (resp.ok) {
      const data = await resp.json();
      profilesConfig = JSON.parse(b64DecodeUTF8(data.content));
      if (profilesConfig[PROFILE_KEY]) {
        PROFILE = { ...PROFILE, ...profilesConfig[PROFILE_KEY] };
      }
    }
  } catch { /* use defaults */ }
  // Update page title
  document.querySelector("h1").textContent = PROFILE.label;
  document.title = PROFILE.label;
}

let currentPortfolio = null;
let fileSha = null;
let stockVerified = false;
let verifiedStockName = "";

// ── UTF-8 safe Base64 decode/encode ───────────────────────────────────────
function b64DecodeUTF8(str) {
  const bin = atob(str.replace(/\s/g, ""));
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return new TextDecoder("utf-8").decode(bytes);
}
function b64EncodeUTF8(str) {
  const bytes = new TextEncoder().encode(str);
  let bin = "";
  for (const b of bytes) bin += String.fromCharCode(b);
  return btoa(bin);
}

// ── Token Management ──────────────────────────────────────────────────────
function getToken() { return localStorage.getItem("gh_pat") || ""; }
function saveToken() {
  const val = document.getElementById("gh-token-input").value.trim();
  if (!val) return showToast("Please enter a token", "error");
  localStorage.setItem("gh_pat", val);
  document.getElementById("gh-token-input").value = "";
  document.getElementById("token-bar").style.display = "none";
  showToast("Token saved to browser");
  loadProfiles();
}
(function() {
  if (getToken()) {
    document.getElementById("token-bar").style.display = "none";
    loadProfiles();
  }
})();

// ── Tab Switching ─────────────────────────────────────────────────────────
const TAB_IDS = ["stock","sell","gold","sellgold","view","charts"];
function switchTab(tab) {
  document.querySelectorAll(".tab").forEach((t, i) => {
    t.classList.toggle("active", TAB_IDS[i] === tab);
  });
  document.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));
  document.getElementById(`tab-${tab}`).classList.add("active");
  if (tab === "view") loadPortfolio();
  if (tab === "sell") loadSellDropdown();
  if (tab === "sellgold") loadSellGoldDropdown();
}

// ── Toast ─────────────────────────────────────────────────────────────────
function showToast(msg, type = "success") {
  const t = document.getElementById("toast");
  t.className = `toast ${type} show`;
  t.textContent = msg;
  setTimeout(() => t.classList.remove("show"), 3000);
}

// ── GitHub API ────────────────────────────────────────────────────────────
async function fetchPortfolio() {
  const resp = await fetch(`${API_BASE}/contents/${PROFILE.portfolio_file}`, {
    headers: { Authorization: `token ${getToken()}` }
  });
  if (!resp.ok) throw new Error("Failed to fetch portfolio. Check your token.");
  const data = await resp.json();
  fileSha = data.sha;
  currentPortfolio = JSON.parse(b64DecodeUTF8(data.content));
  return currentPortfolio;
}

async function savePortfolio(message) {
  const content = b64EncodeUTF8(JSON.stringify(currentPortfolio, null, 2) + "\n");
  let resp = await fetch(`${API_BASE}/contents/${PROFILE.portfolio_file}`, {
    method: "PUT",
    headers: { Authorization: `token ${getToken()}`, "Content-Type": "application/json" },
    body: JSON.stringify({ message, content, sha: fileSha })
  });
  // SHA conflict: re-fetch and retry once
  if (resp.status === 409) {
    await fetchPortfolio();
    resp = await fetch(`${API_BASE}/contents/${PROFILE.portfolio_file}`, {
      method: "PUT",
      headers: { Authorization: `token ${getToken()}`, "Content-Type": "application/json" },
      body: JSON.stringify({ message, content, sha: fileSha })
    });
  }
  const result = await resp.json();
  if (!resp.ok) throw new Error(result.message || "Failed to save");
  fileSha = result.content.sha;
}

async function fetchFileBase64(path) {
  const resp = await fetch(`${API_BASE}/contents/${path}`, {
    headers: { Authorization: `token ${getToken()}` }
  });
  if (!resp.ok) return null;
  const data = await resp.json();
  return data.content;
}

let searchTimer = null;
function onSymbolInput() {
  clearTimeout(searchTimer);
  stockVerified = false;
  document.getElementById("stock-search-result").classList.remove("show");
  const val = document.getElementById("stock-symbol").value.trim();
  if (val.length < 1) { document.getElementById("stock-dropdown").style.display = "none"; return; }
  searchTimer = setTimeout(() => searchStockLocal(val), 100);
}

function searchStockLocal(query) {
  const dd = document.getElementById("stock-dropdown");
  const q = query.toLowerCase();
  const matches = TICKERS.filter(([sym, name]) =>
    sym.toLowerCase().includes(q) || name.toLowerCase().includes(q)
  ).slice(0, 8);

  if (!matches.length) {
    dd.innerHTML = `<div style="padding:8px 12px;color:#8b949e;font-size:13px;">未找到匹配，可手动输入正确的美股代码</div>
      <div style="padding:8px 12px;cursor:pointer;border-top:1px solid #21262d;color:#e3b341;font-size:13px;"
           onmousedown="selectStock('${query.toUpperCase()}', '${query.toUpperCase()}')">
        使用 "${query.toUpperCase()}" 作为代码
      </div>`;
    dd.style.display = "block";
    return;
  }

  dd.innerHTML = matches.map(([sym, name]) =>
    `<div style="padding:8px 12px;cursor:pointer;border-bottom:1px solid #21262d;color:#c9d1d9;font-size:13px;"
          onmousedown="selectStock('${sym}', '${name.replace(/'/g, "\\'")}')">
      <span style="color:#58a6ff;font-weight:700;">${sym}</span>
      <span style="color:#8b949e;margin-left:8px;">${name}</span>
    </div>`
  ).join("");
  dd.style.display = "block";
}

function selectStock(symbol, name) {
  document.getElementById("stock-symbol").value = symbol;
  document.getElementById("stock-dropdown").style.display = "none";
  stockVerified = true;
  verifiedStockName = name;
  const r = document.getElementById("stock-search-result");
  r.innerHTML = `<span class="name">✅ ${symbol} - ${name}</span>`;
  r.classList.add("show");
}

// ── Add Stock ─────────────────────────────────────────────────────────────
async function addStock() {
  const symbol = document.getElementById("stock-symbol").value.trim();
  const shares = parseFloat(document.getElementById("stock-shares").value);
  const cost = parseFloat(document.getElementById("stock-cost").value);
  const btn = document.getElementById("btn-add-stock");
  if (!symbol) return showToast("Enter a stock symbol", "error");
  if (!stockVerified) return showToast("请从搜索下拉列表中选择股票，确保代码正确", "error");
  if (!shares || shares <= 0) return showToast("Enter valid shares", "error");
  if (!cost || cost < 0) return showToast("Enter valid cost price", "error");
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>Submitting...';
  try {
    await fetchPortfolio();
    const ex = currentPortfolio.stocks.positions.find(p => p.symbol === symbol);
    if (ex) {
      ex.batches.push({ shares, cost_price: cost });
      ex.shares = parseFloat((ex.shares + shares).toFixed(6));
    } else {
      currentPortfolio.stocks.positions.push({ symbol, name: verifiedStockName || symbol, shares, batches: [{ shares, cost_price: cost }] });
    }
    await savePortfolio(`Add stock: ${shares} shares of ${symbol} @ $${cost}`);
    showToast(`Added ${shares} shares of ${symbol} @ $${cost}`);
    document.getElementById("stock-symbol").value = "";
    document.getElementById("stock-shares").value = "";
    document.getElementById("stock-cost").value = "";
    document.getElementById("stock-search-result").classList.remove("show");
  } catch (e) { showToast(`Error: ${e.message}`, "error"); }
  finally { btn.disabled = false; btn.textContent = "Add Stock Position"; }
}

function onSellSymbolChange() {
  const symbol = document.getElementById("sell-symbol").value;

  document.getElementById("sell-pnl-preview").classList.remove("show");
  if (!symbol || !currentPortfolio) { info.classList.remove("show"); return; }
  const pos = currentPortfolio.stocks.positions.find(p => p.symbol === symbol);
  if (!pos) return;
  const tc = pos.batches.reduce((s,b) => s + b.shares * b.cost_price, 0);
  const ts = pos.batches.reduce((s,b) => s + b.shares, 0);
  const avg = ts > 0 ? tc/ts : 0;
  const batches = pos.batches.map((b,i) => `Batch ${i+1}: ${b.shares} shares @ $${b.cost_price.toFixed(2)}`).join("<br>");
  info.innerHTML = `<span class="name">${pos.symbol} - ${pos.name}</span><br>Total: ${pos.shares} shares | Avg: $${avg.toFixed(2)}<br><span style="color:#8b949e;font-size:12px;">${batches}</span>`;

}

function previewSellPnL() {
  const symbol = document.getElementById("sell-symbol").value;
  const ss = parseFloat(document.getElementById("sell-shares").value);
  const sp = parseFloat(document.getElementById("sell-price").value);
  const div = document.getElementById("sell-pnl-preview");
  if (!symbol || !ss || !sp || !currentPortfolio) { div.classList.remove("show"); return; }
  const pos = currentPortfolio.stocks.positions.find(p => p.symbol === symbol);
  if (!pos) return;
  if (ss > pos.shares + 1e-6) { div.innerHTML = `<span class="error">Only ${pos.shares} shares held</span>`; div.classList.add("show"); return; }
  let rem = ss, cost = 0;
  for (const b of pos.batches) { if (rem <= 0) break; const sold = Math.min(rem, b.shares); cost += sold * b.cost_price; rem -= sold; }
  const rev = ss * sp, pnl = rev - cost, pct = cost > 0 ? pnl/cost*100 : 0;
  const c = pnl >= 0 ? "#3fb950" : "#f85149", s = pnl >= 0 ? "+" : "";
  div.innerHTML = `<span style="color:#8b949e;">FIFO Preview:</span><br>Revenue: $${rev.toFixed(2)} | Cost: $${cost.toFixed(2)}<br><span style="color:${c};font-weight:700;font-size:16px;">P&L: ${s}$${pnl.toFixed(2)} (${s}${pct.toFixed(2)}%)</span>`;
  div.classList.add("show");
}

async function sellStock() {
  const symbol = document.getElementById("sell-symbol").value;
  const ss = parseFloat(document.getElementById("sell-shares").value);
  const sp = parseFloat(document.getElementById("sell-price").value);
  const btn = document.getElementById("btn-sell-stock");
  if (!symbol) return showToast("Select a stock", "error");
  if (!ss || ss <= 0) return showToast("Enter shares to sell", "error");
  if (!sp || sp < 0) return showToast("Enter sell price", "error");
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>Selling...';
  try {
    await fetchPortfolio();
    const pos = currentPortfolio.stocks.positions.find(p => p.symbol === symbol);
    if (!pos) throw new Error(`${symbol} not found`);
    if (ss > pos.shares + 1e-6) throw new Error(`Only ${pos.shares} shares held`);
    let rem = ss; const nb = [];
    for (const b of pos.batches) { if (rem <= 0) { nb.push(b); continue; } if (rem >= b.shares - 1e-6) { rem -= b.shares; } else { nb.push({ shares: parseFloat((b.shares-rem).toFixed(6)), cost_price: b.cost_price }); rem = 0; } }
    pos.batches = nb; pos.shares = parseFloat(nb.reduce((s,b) => s + b.shares, 0).toFixed(6));
    if (pos.shares <= 1e-6) currentPortfolio.stocks.positions = currentPortfolio.stocks.positions.filter(p => p.symbol !== symbol);
    await savePortfolio(`Sell stock: ${ss} shares of ${symbol} @ $${sp}`);
    showToast(`Sold ${ss} shares of ${symbol} @ $${sp}`);
    document.getElementById("sell-shares").value = ""; document.getElementById("sell-price").value = "";
    document.getElementById("sell-info").classList.remove("show"); document.getElementById("sell-pnl-preview").classList.remove("show");
    loadSellDropdown();
  } catch (e) { showToast(`Error: ${e.message}`, "error"); }
  finally { btn.disabled = false; btn.textContent = "Sell Stock"; }
}

async function loadPortfolio() {

  try {
    await fetchPortfolio();
    let h = "";

    h += '<h3 style="color:#e94560; margin-bottom:12px;">Stocks (Moomoo)</h3>';
    if (!currentPortfolio.stocks.positions.length) h += '<p style="color:#8b949e;">No stocks</p>';
    for (const p of currentPortfolio.stocks.positions) {
      const tc = p.batches.reduce((s,b) => s + b.shares*b.cost_price, 0);
      const ts = p.batches.reduce((s,b) => s + b.shares, 0);
      const avg = ts > 0 ? (tc/ts).toFixed(2) : "0";
      h += `<div class="holding-card"><div class="header"><span class="symbol">${p.symbol} <span style="color:#8b949e;font-weight:400;font-size:13px;">${p.name}</span></span><button class="btn-sm" onclick="removeStock('${p.symbol}')">Remove</button></div><div class="detail">${p.shares} shares | Avg: $${avg} | ${p.batches.length} batch(es)</div></div>`;
    }

    // Gold
    h += '<h3 style="color:#f1c40f; margin:20px 0 12px;">Gold (Alipay)</h3>';
    if (!currentPortfolio.gold.positions.length) h += '<p style="color:#8b949e;">No gold</p>';
    for (const p of currentPortfolio.gold.positions) {
      const tg = p.batches.reduce((s,b) => s + (b.grams||b.grams_approx||0), 0);
      const tc = p.batches.reduce((s,b) => { const g = b.grams||b.grams_approx||0; return s+g*b.cost_per_gram; }, 0);
      const avg = tg > 0 ? (tc/tg).toFixed(2) : "0";
      const safeName = p.name.replace(/'/g, "\\'");
      h += `<div class="holding-card"><div class="header"><span class="symbol">${p.name}</span><button class="btn-sm" onclick="removeGold('${safeName}')">Remove</button></div><div class="detail">${p.grams.toFixed(4)}g | Avg: ¥${avg}/g | ${p.batches.length} batch(es)</div></div>`;
    }

    // Cash
    h += '<h3 style="color:#3fb950; margin:20px 0 12px;">Cash</h3>';
    const cny = currentPortfolio.cash.CNY || 0;
    const sgd = currentPortfolio.cash.SGD || 0;
    h += `<div class="holding-card">
      <div class="detail">CNY: ¥${cny}</div>
      <div class="cash-row"><input type="number" id="cash-cny-input" step="0.01" value="${cny}" placeholder="CNY"><button onclick="updateCash('CNY')">Update CNY</button></div>

    </div>`;

    c.innerHTML = h;
  } catch (e) { c.innerHTML = `<p style="color:#f85149;">Error: ${e.message}</p>`; }
}

async function updateCash(currency) {
  const input = document.getElementById(`cash-${currency.toLowerCase()}-input`);
  const val = parseFloat(input.value);
  if (isNaN(val) || val < 0) return showToast("Enter a valid amount", "error");
  try {
    await fetchPortfolio();
    const old = currentPortfolio.cash[currency] || 0;
    currentPortfolio.cash[currency] = val;
    await savePortfolio(`Update cash: ${currency} ${old} -> ${val}`);
    showToast(`${currency} updated to ${val}`);
    loadPortfolio();
  } catch (e) { showToast(`Error: ${e.message}`, "error"); }
}

// ── Charts / Snapshot ─────────────────────────────────────────────────────
async function fetchLivePrice(symbol) {
  // Race multiple CORS proxies — first success wins
  const yahooUrl = `https://query2.finance.yahoo.com/v8/finance/chart/${symbol}?range=1d&interval=1d`;
  const proxies = [
    `https://corsproxy.io/?url=${encodeURIComponent(yahooUrl)}`,
    `https://api.allorigins.win/raw?url=${encodeURIComponent(yahooUrl)}`,
  ];

  async function tryFetch(url) {
    const resp = await fetch(url, { signal: AbortSignal.timeout(10000) });
    if (!resp.ok) throw new Error("not ok");
    const data = await resp.json();
    return { price: data.chart.result[0].meta.regularMarketPrice, currency: data.chart.result[0].meta.currency };
  }

  try {
    // Race all proxies — first to succeed wins
    return await Promise.any(proxies.map(u => tryFetch(u)));
  } catch { return null; }
}

async function fetchUsdCny() {
  try {
    const resp = await fetch("https://open.er-api.com/v6/latest/USD", { signal: AbortSignal.timeout(8000) });
    if (!resp.ok) return 6.9;
    const data = await resp.json();
    return data.rates.CNY || 6.9;
  } catch { return 6.9; }
}

async function refreshSnapshot() {
  const btn = document.getElementById("btn-refresh-snapshot");
  const area = document.getElementById("charts-area");
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>Fetching live prices...';

  if (!currentPortfolio) {
    try { await fetchPortfolio(); } catch (e) {
      area.innerHTML = `<p style="color:#f85149;">Error: ${e.message}</p>`;
      btn.disabled = false; btn.textContent = "Refresh Latest Snapshot"; return;
    }
  }

  const now = new Date();
  const bjTime = new Date(now.getTime() + 8 * 3600000);
  const dateStr = bjTime.toISOString().slice(0, 10);
  const timeStr = bjTime.toISOString().slice(11, 16);

  let html = `<h3 style="color:#58a6ff;margin:16px 0 8px;">Live Snapshot (${dateStr} ${timeStr} 北京时间)</h3>`;

  // Fetch USD/CNY and all stock prices in parallel
  const positions = currentPortfolio.stocks.positions;
  const symbols = positions.map(p => p.symbol);
  const [usdCny, ...priceResults] = await Promise.all([
    fetchUsdCny(),
    ...symbols.map(s => fetchLivePrice(s))
  ]);

  html += `<div class="detail" style="color:#8b949e;margin-bottom:8px;">💱 1 USD = ${usdCny.toFixed(4)} CNY</div>`;

  // Stock section
  html += '<h4 style="color:#e94560;margin:12px 0 6px;">美股持仓</h4>';
  let stockTotalPnlCny = 0;
  let stockTotalValueCny = 0;

  for (let i = 0; i < positions.length; i++) {
    const p = positions[i];
    const priceData = priceResults[i];
    const avgCost = p.batches.reduce((s, b) => s + (b.cost_price || b.price || 0) * b.shares, 0) / p.shares;

    if (priceData && priceData.price) {
      const currentPrice = priceData.price;
      const pnlUsd = (currentPrice - avgCost) * p.shares;
      const pnlCny = pnlUsd * usdCny;
      const pnlPct = ((currentPrice - avgCost) / avgCost * 100);
      const valueCny = currentPrice * p.shares * usdCny;
      stockTotalPnlCny += pnlCny;
      stockTotalValueCny += valueCny;
      const color = pnlCny >= 0 ? "#3fb950" : "#f85149";
      const sign = pnlCny >= 0 ? "+" : "";
      html += `<div class="holding-card"><div class="detail"><span class="symbol">${p.symbol}</span> ${p.name}<br>`;
      html += `现价: $${currentPrice.toFixed(2)} | 均价: $${avgCost.toFixed(2)} | ${p.shares}股<br>`;
      html += `<span style="color:${color};">盈亏: ¥${sign}${pnlCny.toFixed(2)} (${sign}${pnlPct.toFixed(2)}%)</span></div></div>`;
    } else {
      html += `<div class="holding-card"><div class="detail"><span class="symbol">${p.symbol}</span> ${p.name}<br>`;
      html += `<span style="color:#e3b341;">价格获取失败</span></div></div>`;
    }
  }

  const stColor = stockTotalPnlCny >= 0 ? "#3fb950" : "#f85149";
  html += `<div class="detail" style="color:${stColor};margin:8px 0;">股票合计盈亏: ¥${stockTotalPnlCny.toFixed(2)}</div>`;

  // Gold section
  html += '<h4 style="color:#f1c40f;margin:12px 0 6px;">黄金持仓</h4>';
  let goldTotalPnlCny = 0;

  // Fetch gold price (use history fallback)
  let goldPriceCny = 0;
  try {
    const goldData = await fetchLivePrice("GC=F");
    if (goldData && goldData.price) {
      // COMEX gold: USD per troy oz → CNY per gram
      goldPriceCny = goldData.price * usdCny / 31.1035;
    }
  } catch {}

  if (goldPriceCny > 0 && currentPortfolio.gold.positions.length > 0) {
    for (const g of currentPortfolio.gold.positions) {
      const avgCost = g.batches.reduce((s, b) => s + (b.cost_per_gram || b.price_per_gram || 0) * (b.grams || b.grams_approx || 0), 0) / g.grams;
      const pnlCny = (goldPriceCny - avgCost) * g.grams;
      goldTotalPnlCny += pnlCny;
      const pnlPct = (goldPriceCny - avgCost) / avgCost * 100;
      const color = pnlCny >= 0 ? "#3fb950" : "#f85149";
      const sign = pnlCny >= 0 ? "+" : "";
      html += `<div class="holding-card"><div class="detail"><span class="symbol">${g.name}</span><br>`;
      html += `现价: ¥${goldPriceCny.toFixed(2)}/克 | 均价: ¥${avgCost.toFixed(2)}/克 | ${g.grams.toFixed(4)}克<br>`;
      html += `<span style="color:${color};">盈亏: ¥${sign}${pnlCny.toFixed(2)} (${sign}${pnlPct.toFixed(2)}%)</span></div></div>`;
    }
  } else if (currentPortfolio.gold.positions.length > 0) {
    html += `<div class="holding-card"><div class="detail"><span style="color:#e3b341;">金价获取失败</span></div></div>`;
  }

  const glColor = goldTotalPnlCny >= 0 ? "#3fb950" : "#f85149";
  html += `<div class="detail" style="color:${glColor};margin:8px 0;">黄金合计盈亏: ¥${goldTotalPnlCny.toFixed(2)}</div>`;

  // Cash
  const cashCny = (currentPortfolio.cash.CNY || 0) + (currentPortfolio.cash.SGD || 0) * usdCny * 0.78;
  html += '<h4 style="color:#3fb950;margin:12px 0 6px;">现金</h4>';
  html += `<div class="detail">CNY: ¥${currentPortfolio.cash.CNY || 0} | SGD: S$${currentPortfolio.cash.SGD || 0}</div>`;

  // Total
  const totalCny = stockTotalValueCny + (goldPriceCny > 0 ? currentPortfolio.gold.positions.reduce((s, g) => s + goldPriceCny * g.grams, 0) : 0) + cashCny;
  const totalPnl = stockTotalPnlCny + goldTotalPnlCny;
  const tColor = totalPnl >= 0 ? "#3fb950" : "#f85149";
  html += `<hr style="border-color:#30363d;margin:12px 0;">`;
  html += `<div class="detail" style="font-size:15px;">💰 总资产: ¥${totalCny.toFixed(2)}</div>`;
  html += `<div class="detail" style="color:${tColor};font-size:15px;">总盈亏: ¥${totalPnl.toFixed(2)}</div>`;

  area.innerHTML = html;
  btn.disabled = false; btn.textContent = "Refresh Latest Snapshot";
}

async function triggerWeeklyReport() {
  const btn = document.getElementById("btn-push-wechat");
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>Triggering...';
  try {
    const resp = await fetch(`${API_BASE}/actions/workflows/weekly_report.yml/dispatches`, {
      method: "POST",
      headers: { Authorization: `token ${getToken()}`, "Content-Type": "application/json" },
      body: JSON.stringify({ ref: "main", inputs: { profile: PROFILE_KEY } })
    });
    if (resp.ok || resp.status === 204) {
      showToast("已触发推送！约60秒后企业微信将收到报告和图表");
    } else {
      const err = await resp.json();
      showToast(`触发失败: ${err.message}`, "error");
    }
  } catch (e) { showToast(`Error: ${e.message}`, "error"); }
  finally { btn.disabled = false; btn.textContent = "📊 Send Charts to WeChat"; }
}
</script>
