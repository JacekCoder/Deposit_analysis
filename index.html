<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Manager</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  background: #0d1117; color: #c9d1d9; min-height: 100vh;
}
.container { max-width: 640px; margin: 0 auto; padding: 20px; }
h1 { text-align: center; color: #58a6ff; margin-bottom: 8px; font-size: 22px; }
.subtitle { text-align: center; color: #8b949e; margin-bottom: 24px; font-size: 13px; }

/* Tabs */
.tabs { display: flex; gap: 4px; margin-bottom: 20px; flex-wrap: wrap; }
.tab {
  flex: 1; min-width: 70px; padding: 9px 4px; text-align: center;
  border: 1px solid #30363d; border-radius: 8px; cursor: pointer;
  background: #161b22; color: #8b949e; font-size: 13px; transition: all 0.2s;
}
.tab.active { background: #1f6feb; color: #fff; border-color: #1f6feb; }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* Form */
.form-group { margin-bottom: 16px; }
.form-group label { display: block; color: #8b949e; font-size: 13px; margin-bottom: 6px; }
.form-group input, .form-group select {
  width: 100%; padding: 10px 12px; background: #161b22; border: 1px solid #30363d;
  border-radius: 8px; color: #c9d1d9; font-size: 15px; outline: none;
}
.form-group input:focus, .form-group select:focus { border-color: #1f6feb; }
.form-group select { cursor: pointer; appearance: auto; }
.form-group .hint { font-size: 11px; color: #6e7681; margin-top: 4px; }

.row { display: flex; gap: 12px; }
.row .form-group { flex: 1; }

.btn {
  width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 15px;
  font-weight: 600; cursor: pointer; transition: all 0.2s; margin-top: 8px;
}
.btn-primary { background: #238636; color: #fff; }
.btn-primary:hover { background: #2ea043; }
.btn-primary:disabled { background: #1a3a1a; color: #4a8c4a; cursor: not-allowed; }
.btn-danger { background: #da3633; color: #fff; }
.btn-danger:hover { background: #e5534b; }
.btn-danger:disabled { background: #3a1a1a; color: #8c4a4a; cursor: not-allowed; }
.btn-blue { background: #1f6feb; color: #fff; }
.btn-blue:hover { background: #388bfd; }
.btn-blue:disabled { background: #1a2a4a; color: #4a6a8c; cursor: not-allowed; }

/* Info box */
.info-box {
  padding: 12px; background: #161b22; border: 1px solid #30363d;
  border-radius: 8px; margin-bottom: 16px; display: none;
}
.info-box.show { display: block; }
.info-box .name { color: #58a6ff; font-weight: 600; }
.info-box .price { color: #3fb950; }
.info-box .error { color: #f85149; }

/* Holding cards */
.holding-card {
  background: #161b22; border: 1px solid #30363d; border-radius: 8px;
  padding: 12px; margin-bottom: 8px;
}
.holding-card .header { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
.holding-card .symbol { color: #58a6ff; font-weight: 700; font-size: 15px; }
.holding-card .detail { color: #8b949e; font-size: 13px; margin-top: 4px; }
.holding-card .btn-sm {
  background: none; padding: 4px 10px; border-radius: 6px; font-size: 12px; cursor: pointer;
  border: 1px solid #da3633; color: #da3633;
}
.holding-card .btn-sm:hover { background: #da3633; color: #fff; }

/* Cash edit row */
.cash-row { display: flex; gap: 8px; align-items: center; margin-top: 8px; }
.cash-row input { width: 120px; padding: 6px 8px; background: #161b22; border: 1px solid #30363d;
  border-radius: 6px; color: #c9d1d9; font-size: 14px; outline: none; }
.cash-row button { padding: 6px 12px; border: none; border-radius: 6px; font-size: 12px;
  font-weight: 600; cursor: pointer; background: #238636; color: #fff; }

/* Chart area */
.chart-area { margin-top: 16px; text-align: center; }
.chart-area img { max-width: 100%; border-radius: 8px; margin-bottom: 12px; }

/* Toast */
.toast {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  padding: 12px 24px; border-radius: 8px; font-size: 14px; font-weight: 600;
  z-index: 1000; display: none; max-width: 90%;
}
.toast.success { background: #238636; color: #fff; }
.toast.error { background: #da3633; color: #fff; }
.toast.show { display: block; animation: fadeInOut 3s ease; }
@keyframes fadeInOut {
  0% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
  15% { opacity: 1; transform: translateX(-50%) translateY(0); }
  85% { opacity: 1; }
  100% { opacity: 0; }
}

.spinner {
  display: inline-block; width: 16px; height: 16px;
  border: 2px solid #fff; border-top-color: transparent;
  border-radius: 50%; animation: spin 0.6s linear infinite;
  vertical-align: middle; margin-right: 6px;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="container">
  <h1>Portfolio Manager</h1>
  <p class="subtitle">Manage your stock, gold and cash holdings</p>

  <!-- Token input -->
  <div id="token-bar" class="form-group" style="margin-bottom:20px;">
    <label>GitHub Token <span style="font-size:11px;color:#6e7681;">(saved locally in browser)</span></label>
    <div style="display:flex;gap:8px;">
      <input type="password" id="gh-token-input" placeholder="ghp_xxxx..." style="flex:1;">
      <button class="btn btn-primary" style="width:auto;margin-top:0;padding:8px 16px;" onclick="saveToken()">Save</button>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('stock')">Buy Stock</div>
    <div class="tab" onclick="switchTab('sell')">Sell Stock</div>
    <div class="tab" onclick="switchTab('gold')">Buy Gold</div>
    <div class="tab" onclick="switchTab('sellgold')">Sell Gold</div>
    <div class="tab" onclick="switchTab('view')">View</div>
    <div class="tab" onclick="switchTab('charts')">Charts</div>
  </div>

  <!-- Buy Stock Tab -->
  <div id="tab-stock" class="tab-content active">
    <div class="form-group">
      <label>Stock Symbol</label>
      <input type="text" id="stock-symbol" placeholder="e.g. AAPL, TSLA, NVDA"
             oninput="this.value=this.value.toUpperCase()" onblur="searchStock()">
      <div class="hint">必须填yfinance支持的美股代码（如AAPL、NVDA、QQQ），填错会导致价格为0</div>
    </div>
    <div id="stock-search-result" class="info-box"></div>
    <div class="row">
      <div class="form-group">
        <label>Shares</label>
        <input type="number" id="stock-shares" step="0.01" min="0.01" placeholder="e.g. 1.5">
      </div>
      <div class="form-group">
        <label>Cost Price (USD)</label>
        <input type="number" id="stock-cost" step="0.01" min="0" placeholder="e.g. 178.45">
      </div>
    </div>
    <button class="btn btn-primary" id="btn-add-stock" onclick="addStock()">Add Stock Position</button>
  </div>

  <!-- Sell Stock Tab -->
  <div id="tab-sell" class="tab-content">
    <div class="form-group">
      <label>Select Stock to Sell</label>
      <select id="sell-symbol" onchange="onSellSymbolChange()">
        <option value="">-- Loading --</option>
      </select>
    </div>
    <div id="sell-info" class="info-box"></div>
    <div class="row">
      <div class="form-group">
        <label>Shares to Sell</label>
        <input type="number" id="sell-shares" step="0.01" min="0.01" placeholder="e.g. 0.5"
               oninput="previewSellPnL()">
      </div>
      <div class="form-group">
        <label>Sell Price (USD)</label>
        <input type="number" id="sell-price" step="0.01" min="0" placeholder="e.g. 195.00"
               oninput="previewSellPnL()">
      </div>
    </div>
    <div id="sell-pnl-preview" class="info-box" style="border-color:#f39c12;"></div>
    <button class="btn btn-danger" id="btn-sell-stock" onclick="sellStock()">Sell Stock</button>
  </div>

  <!-- Buy Gold Tab -->
  <div id="tab-gold" class="tab-content">
    <div class="form-group">
      <label>Gold Product Name</label>
      <input type="text" id="gold-name" placeholder="e.g. 浙商银行积存金">
      <div class="hint">自定义名称，不需要对应API，黄金价格统一用国际金价计算</div>
    </div>
    <div class="row">
      <div class="form-group">
        <label>Grams</label>
        <input type="number" id="gold-grams" step="0.0001" min="0.0001" placeholder="e.g. 1.021">
      </div>
      <div class="form-group">
        <label>Cost (CNY/gram)</label>
        <input type="number" id="gold-cost" step="0.01" min="0" placeholder="e.g. 1194.91">
      </div>
    </div>
    <button class="btn btn-primary" id="btn-add-gold" onclick="addGold()">Add Gold Position</button>
  </div>

  <!-- Sell Gold Tab -->
  <div id="tab-sellgold" class="tab-content">
    <div class="form-group">
      <label>Select Gold to Sell</label>
      <select id="sellgold-name" onchange="onSellGoldChange()">
        <option value="">-- Loading --</option>
      </select>
    </div>
    <div id="sellgold-info" class="info-box"></div>
    <div class="row">
      <div class="form-group">
        <label>Grams to Sell</label>
        <input type="number" id="sellgold-grams" step="0.0001" min="0.0001" placeholder="e.g. 0.5"
               oninput="previewSellGoldPnL()">
      </div>
      <div class="form-group">
        <label>Sell Price (CNY/gram)</label>
        <input type="number" id="sellgold-price" step="0.01" min="0" placeholder="e.g. 1200"
               oninput="previewSellGoldPnL()">
      </div>
    </div>
    <div id="sellgold-pnl-preview" class="info-box" style="border-color:#f1c40f;"></div>
    <button class="btn btn-danger" id="btn-sell-gold" onclick="sellGold()">Sell Gold</button>
  </div>

  <!-- View Tab -->
  <div id="tab-view" class="tab-content">
    <div id="holdings-list">
      <p style="color:#8b949e; text-align:center;">Loading...</p>
    </div>
  </div>

  <!-- Charts Tab -->
  <div id="tab-charts" class="tab-content">
    <button class="btn btn-blue" id="btn-load-charts" onclick="loadCharts()">Load Weekly Charts</button>
    <div id="charts-area" class="chart-area"></div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
const REPO_OWNER = "JacekCoder";
const REPO_NAME = "Deposit_analysis";
const API_BASE = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}`;

let currentPortfolio = null;
let fileSha = null;
let stockVerified = false;
let verifiedStockName = "";

// ── UTF-8 safe Base64 decode/encode ───────────────────────────────────────
function b64DecodeUTF8(str) {
  const bin = atob(str.replace(/\s/g, ""));
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return new TextDecoder("utf-8").decode(bytes);
}
function b64EncodeUTF8(str) {
  const bytes = new TextEncoder().encode(str);
  let bin = "";
  for (const b of bytes) bin += String.fromCharCode(b);
  return btoa(bin);
}

// ── Token Management ──────────────────────────────────────────────────────
function getToken() { return localStorage.getItem("gh_pat") || ""; }
function saveToken() {
  const val = document.getElementById("gh-token-input").value.trim();
  if (!val) return showToast("Please enter a token", "error");
  localStorage.setItem("gh_pat", val);
  document.getElementById("gh-token-input").value = "";
  document.getElementById("token-bar").style.display = "none";
  showToast("Token saved to browser");
}
(function() {
  if (getToken()) document.getElementById("token-bar").style.display = "none";
})();

// ── Tab Switching ─────────────────────────────────────────────────────────
const TAB_IDS = ["stock","sell","gold","sellgold","view","charts"];
function switchTab(tab) {
  document.querySelectorAll(".tab").forEach((t, i) => {
    t.classList.toggle("active", TAB_IDS[i] === tab);
  });
  document.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));
  document.getElementById(`tab-${tab}`).classList.add("active");
  if (tab === "view") loadPortfolio();
  if (tab === "sell") loadSellDropdown();
  if (tab === "sellgold") loadSellGoldDropdown();
}

// ── Toast ─────────────────────────────────────────────────────────────────
function showToast(msg, type = "success") {
  const t = document.getElementById("toast");
  t.className = `toast ${type} show`;
  t.textContent = msg;
  setTimeout(() => t.classList.remove("show"), 3000);
}

// ── GitHub API ────────────────────────────────────────────────────────────
async function fetchPortfolio() {
  const resp = await fetch(`${API_BASE}/contents/portfolio.json`, {
    headers: { Authorization: `token ${getToken()}` }
  });
  if (!resp.ok) throw new Error("Failed to fetch portfolio. Check your token.");
  const data = await resp.json();
  fileSha = data.sha;
  currentPortfolio = JSON.parse(b64DecodeUTF8(data.content));
  return currentPortfolio;
}

async function savePortfolio(message) {
  const content = b64EncodeUTF8(JSON.stringify(currentPortfolio, null, 2) + "\n");
  const resp = await fetch(`${API_BASE}/contents/portfolio.json`, {
    method: "PUT",
    headers: { Authorization: `token ${getToken()}`, "Content-Type": "application/json" },
    body: JSON.stringify({ message, content, sha: fileSha })
  });
  if (!resp.ok) {
    const err = await resp.json();
    throw new Error(err.message || "Failed to save");
  }
  fileSha = (await resp.json()).content.sha;
}

async function fetchFileBase64(path) {
  const resp = await fetch(`${API_BASE}/contents/${path}`, {
    headers: { Authorization: `token ${getToken()}` }
  });
  if (!resp.ok) return null;
  const data = await resp.json();
  return data.content;
}

// ── Stock Search ──────────────────────────────────────────────────────────
async function searchStock() {
  const symbol = document.getElementById("stock-symbol").value.trim();
  const r = document.getElementById("stock-search-result");
  stockVerified = false;
  if (!symbol) { r.classList.remove("show"); return; }
  r.innerHTML = '<span style="color:#8b949e">Searching...</span>';
  r.classList.add("show");
  try {
    const resp = await fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?range=1d&interval=1d`);
    if (resp.ok) {
      const data = await resp.json();
      const meta = data.chart.result[0].meta;
      verifiedStockName = meta.longName || meta.shortName || symbol;
      stockVerified = true;
      r.innerHTML = `<span class="name">${symbol} - ${verifiedStockName}</span><br><span class="price">Current: $${meta.regularMarketPrice.toFixed(2)}</span>`;
    } else { throw new Error("not found"); }
  } catch {
    stockVerified = true; verifiedStockName = symbol;
    r.innerHTML = `<span style="color:#e3b341">Cannot verify (CORS). "${symbol}" will be added as-is.</span>`;
  }
}

// ── Add Stock ─────────────────────────────────────────────────────────────
async function addStock() {
  const symbol = document.getElementById("stock-symbol").value.trim();
  const shares = parseFloat(document.getElementById("stock-shares").value);
  const cost = parseFloat(document.getElementById("stock-cost").value);
  const btn = document.getElementById("btn-add-stock");
  if (!symbol) return showToast("Enter a stock symbol", "error");
  if (!shares || shares <= 0) return showToast("Enter valid shares", "error");
  if (!cost || cost < 0) return showToast("Enter valid cost price", "error");
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>Submitting...';
  try {
    await fetchPortfolio();
    const ex = currentPortfolio.stocks.positions.find(p => p.symbol === symbol);
    if (ex) {
      ex.batches.push({ shares, cost_price: cost });
      ex.shares = parseFloat((ex.shares + shares).toFixed(6));
    } else {
      currentPortfolio.stocks.positions.push({ symbol, name: verifiedStockName || symbol, shares, batches: [{ shares, cost_price: cost }] });
    }
    await savePortfolio(`Add stock: ${shares} shares of ${symbol} @ $${cost}`);
    showToast(`Added ${shares} shares of ${symbol} @ $${cost}`);
    document.getElementById("stock-symbol").value = "";
    document.getElementById("stock-shares").value = "";
    document.getElementById("stock-cost").value = "";
    document.getElementById("stock-search-result").classList.remove("show");
  } catch (e) { showToast(`Error: ${e.message}`, "error"); }
  finally { btn.disabled = false; btn.textContent = "Add Stock Position"; }
}

// ── Sell Stock ────────────────────────────────────────────────────────────
async function loadSellDropdown() {
  const sel = document.getElementById("sell-symbol");
  sel.innerHTML = '<option value="">Loading...</option>';
  document.getElementById("sell-info").classList.remove("show");
  document.getElementById("sell-pnl-preview").classList.remove("show");
  try {
    await fetchPortfolio();
    const pos = currentPortfolio.stocks.positions;
    if (!pos.length) { sel.innerHTML = '<option value="">No stocks held</option>'; return; }
    sel.innerHTML = '<option value="">-- Select --</option>';
    for (const p of pos) { const o = document.createElement("option"); o.value = p.symbol; o.textContent = `${p.symbol} (${p.name}) - ${p.shares} shares`; sel.appendChild(o); }
  } catch (e) { sel.innerHTML = '<option value="">Error</option>'; showToast(e.message, "error"); }
}

function onSellSymbolChange() {
  const symbol = document.getElementById("sell-symbol").value;
  const info = document.getElementById("sell-info");
  document.getElementById("sell-pnl-preview").classList.remove("show");
  if (!symbol || !currentPortfolio) { info.classList.remove("show"); return; }
  const pos = currentPortfolio.stocks.positions.find(p => p.symbol === symbol);
  if (!pos) return;
  const tc = pos.batches.reduce((s,b) => s + b.shares * b.cost_price, 0);
  const ts = pos.batches.reduce((s,b) => s + b.shares, 0);
  const avg = ts > 0 ? tc/ts : 0;
  const batches = pos.batches.map((b,i) => `Batch ${i+1}: ${b.shares} shares @ $${b.cost_price.toFixed(2)}`).join("<br>");
  info.innerHTML = `<span class="name">${pos.symbol} - ${pos.name}</span><br>Total: ${pos.shares} shares | Avg: $${avg.toFixed(2)}<br><span style="color:#8b949e;font-size:12px;">${batches}</span>`;
  info.classList.add("show");
}

function previewSellPnL() {
  const symbol = document.getElementById("sell-symbol").value;
  const ss = parseFloat(document.getElementById("sell-shares").value);
  const sp = parseFloat(document.getElementById("sell-price").value);
  const div = document.getElementById("sell-pnl-preview");
  if (!symbol || !ss || !sp || !currentPortfolio) { div.classList.remove("show"); return; }
  const pos = currentPortfolio.stocks.positions.find(p => p.symbol === symbol);
  if (!pos) return;
  if (ss > pos.shares + 1e-6) { div.innerHTML = `<span class="error">Only ${pos.shares} shares held</span>`; div.classList.add("show"); return; }
  let rem = ss, cost = 0;
  for (const b of pos.batches) { if (rem <= 0) break; const sold = Math.min(rem, b.shares); cost += sold * b.cost_price; rem -= sold; }
  const rev = ss * sp, pnl = rev - cost, pct = cost > 0 ? pnl/cost*100 : 0;
  const c = pnl >= 0 ? "#3fb950" : "#f85149", s = pnl >= 0 ? "+" : "";
  div.innerHTML = `<span style="color:#8b949e;">FIFO Preview:</span><br>Revenue: $${rev.toFixed(2)} | Cost: $${cost.toFixed(2)}<br><span style="color:${c};font-weight:700;font-size:16px;">P&L: ${s}$${pnl.toFixed(2)} (${s}${pct.toFixed(2)}%)</span>`;
  div.classList.add("show");
}

async function sellStock() {
  const symbol = document.getElementById("sell-symbol").value;
  const ss = parseFloat(document.getElementById("sell-shares").value);
  const sp = parseFloat(document.getElementById("sell-price").value);
  const btn = document.getElementById("btn-sell-stock");
  if (!symbol) return showToast("Select a stock", "error");
  if (!ss || ss <= 0) return showToast("Enter shares to sell", "error");
  if (!sp || sp < 0) return showToast("Enter sell price", "error");
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>Selling...';
  try {
    await fetchPortfolio();
    const pos = currentPortfolio.stocks.positions.find(p => p.symbol === symbol);
    if (!pos) throw new Error(`${symbol} not found`);
    if (ss > pos.shares + 1e-6) throw new Error(`Only ${pos.shares} shares held`);
    let rem = ss; const nb = [];
    for (const b of pos.batches) { if (rem <= 0) { nb.push(b); continue; } if (rem >= b.shares - 1e-6) { rem -= b.shares; } else { nb.push({ shares: parseFloat((b.shares-rem).toFixed(6)), cost_price: b.cost_price }); rem = 0; } }
    pos.batches = nb; pos.shares = parseFloat(nb.reduce((s,b) => s + b.shares, 0).toFixed(6));
    if (pos.shares <= 1e-6) currentPortfolio.stocks.positions = currentPortfolio.stocks.positions.filter(p => p.symbol !== symbol);
    await savePortfolio(`Sell stock: ${ss} shares of ${symbol} @ $${sp}`);
    showToast(`Sold ${ss} shares of ${symbol} @ $${sp}`);
    document.getElementById("sell-shares").value = ""; document.getElementById("sell-price").value = "";
    document.getElementById("sell-info").classList.remove("show"); document.getElementById("sell-pnl-preview").classList.remove("show");
    loadSellDropdown();
  } catch (e) { showToast(`Error: ${e.message}`, "error"); }
  finally { btn.disabled = false; btn.textContent = "Sell Stock"; }
}

// ── Add Gold ──────────────────────────────────────────────────────────────
async function addGold() {
  const name = document.getElementById("gold-name").value.trim();
  const grams = parseFloat(document.getElementById("gold-grams").value);
  const cost = parseFloat(document.getElementById("gold-cost").value);
  const btn = document.getElementById("btn-add-gold");
  if (!name) return showToast("Enter gold product name", "error");
  if (!grams || grams <= 0) return showToast("Enter valid grams", "error");
  if (!cost || cost < 0) return showToast("Enter valid cost", "error");
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>Submitting...';
  try {
    await fetchPortfolio();
    const ex = currentPortfolio.gold.positions.find(p => p.name === name);
    if (ex) { ex.batches.push({ grams, cost_per_gram: cost }); ex.grams = parseFloat((ex.grams + grams).toFixed(6)); }
    else { currentPortfolio.gold.positions.push({ name, grams, batches: [{ grams, cost_per_gram: cost }] }); }
    currentPortfolio.gold.total_grams = parseFloat(currentPortfolio.gold.positions.reduce((s,p) => s + p.grams, 0).toFixed(6));
    await savePortfolio(`Add gold: ${grams}g of ${name} @ ¥${cost}/g`);
    showToast(`Added ${grams}g of ${name} @ ¥${cost}/g`);
    document.getElementById("gold-name").value = ""; document.getElementById("gold-grams").value = ""; document.getElementById("gold-cost").value = "";
  } catch (e) { showToast(`Error: ${e.message}`, "error"); }
  finally { btn.disabled = false; btn.textContent = "Add Gold Position"; }
}

// ── Sell Gold ─────────────────────────────────────────────────────────────
async function loadSellGoldDropdown() {
  const sel = document.getElementById("sellgold-name");
  sel.innerHTML = '<option value="">Loading...</option>';
  document.getElementById("sellgold-info").classList.remove("show");
  document.getElementById("sellgold-pnl-preview").classList.remove("show");
  try {
    await fetchPortfolio();
    const pos = currentPortfolio.gold.positions;
    if (!pos.length) { sel.innerHTML = '<option value="">No gold held</option>'; return; }
    sel.innerHTML = '<option value="">-- Select --</option>';
    for (const p of pos) { const o = document.createElement("option"); o.value = p.name; o.textContent = `${p.name} - ${p.grams.toFixed(4)}g`; sel.appendChild(o); }
  } catch (e) { sel.innerHTML = '<option value="">Error</option>'; showToast(e.message, "error"); }
}

function onSellGoldChange() {
  const name = document.getElementById("sellgold-name").value;
  const info = document.getElementById("sellgold-info");
  document.getElementById("sellgold-pnl-preview").classList.remove("show");
  if (!name || !currentPortfolio) { info.classList.remove("show"); return; }
  const pos = currentPortfolio.gold.positions.find(p => p.name === name);
  if (!pos) return;
  const tc = pos.batches.reduce((s,b) => { const g = b.grams||b.grams_approx||0; return s + g*b.cost_per_gram; }, 0);
  const tg = pos.batches.reduce((s,b) => s + (b.grams||b.grams_approx||0), 0);
  const avg = tg > 0 ? tc/tg : 0;
  const batches = pos.batches.map((b,i) => `Batch ${i+1}: ${(b.grams||b.grams_approx||0).toFixed(4)}g @ ¥${b.cost_per_gram.toFixed(2)}/g`).join("<br>");
  info.innerHTML = `<span class="name">${pos.name}</span><br>Total: ${pos.grams.toFixed(4)}g | Avg: ¥${avg.toFixed(2)}/g<br><span style="color:#8b949e;font-size:12px;">${batches}</span>`;
  info.classList.add("show");
}

function previewSellGoldPnL() {
  const name = document.getElementById("sellgold-name").value;
  const sg = parseFloat(document.getElementById("sellgold-grams").value);
  const sp = parseFloat(document.getElementById("sellgold-price").value);
  const div = document.getElementById("sellgold-pnl-preview");
  if (!name || !sg || !sp || !currentPortfolio) { div.classList.remove("show"); return; }
  const pos = currentPortfolio.gold.positions.find(p => p.name === name);
  if (!pos) return;
  if (sg > pos.grams + 1e-6) { div.innerHTML = `<span class="error">Only ${pos.grams.toFixed(4)}g held</span>`; div.classList.add("show"); return; }
  let rem = sg, cost = 0;
  for (const b of pos.batches) { if (rem <= 0) break; const g = b.grams||b.grams_approx||0; const sold = Math.min(rem, g); cost += sold * b.cost_per_gram; rem -= sold; }
  const rev = sg * sp, pnl = rev - cost, pct = cost > 0 ? pnl/cost*100 : 0;
  const c = pnl >= 0 ? "#3fb950" : "#f85149", s = pnl >= 0 ? "+" : "";
  div.innerHTML = `<span style="color:#8b949e;">FIFO Preview:</span><br>Revenue: ¥${rev.toFixed(2)} | Cost: ¥${cost.toFixed(2)}<br><span style="color:${c};font-weight:700;font-size:16px;">P&L: ${s}¥${pnl.toFixed(2)} (${s}${pct.toFixed(2)}%)</span>`;
  div.classList.add("show");
}

async function sellGold() {
  const name = document.getElementById("sellgold-name").value;
  const sg = parseFloat(document.getElementById("sellgold-grams").value);
  const sp = parseFloat(document.getElementById("sellgold-price").value);
  const btn = document.getElementById("btn-sell-gold");
  if (!name) return showToast("Select a gold product", "error");
  if (!sg || sg <= 0) return showToast("Enter grams to sell", "error");
  if (!sp || sp < 0) return showToast("Enter sell price", "error");
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>Selling...';
  try {
    await fetchPortfolio();
    const pos = currentPortfolio.gold.positions.find(p => p.name === name);
    if (!pos) throw new Error(`"${name}" not found`);
    if (sg > pos.grams + 1e-6) throw new Error(`Only ${pos.grams.toFixed(4)}g held`);
    let rem = sg; const nb = [];
    for (const b of pos.batches) {
      const bg = b.grams||b.grams_approx||0;
      if (rem <= 0) { nb.push(b); continue; }
      if (rem >= bg - 1e-6) { rem -= bg; } else {
        const kept = { grams: parseFloat((bg-rem).toFixed(6)), cost_per_gram: b.cost_per_gram };
        nb.push(kept); rem = 0;
      }
    }
    pos.batches = nb; pos.grams = parseFloat(nb.reduce((s,b) => s + (b.grams||b.grams_approx||0), 0).toFixed(6));
    if (pos.grams <= 1e-6) currentPortfolio.gold.positions = currentPortfolio.gold.positions.filter(p => p.name !== name);
    currentPortfolio.gold.total_grams = parseFloat(currentPortfolio.gold.positions.reduce((s,p) => s + p.grams, 0).toFixed(6));
    await savePortfolio(`Sell gold: ${sg}g of ${name} @ ¥${sp}/g`);
    showToast(`Sold ${sg}g of ${name} @ ¥${sp}/g`);
    document.getElementById("sellgold-grams").value = ""; document.getElementById("sellgold-price").value = "";
    document.getElementById("sellgold-info").classList.remove("show"); document.getElementById("sellgold-pnl-preview").classList.remove("show");
    loadSellGoldDropdown();
  } catch (e) { showToast(`Error: ${e.message}`, "error"); }
  finally { btn.disabled = false; btn.textContent = "Sell Gold"; }
}

// ── View Holdings ─────────────────────────────────────────────────────────
async function loadPortfolio() {
  const c = document.getElementById("holdings-list");
  c.innerHTML = '<p style="color:#8b949e; text-align:center;">Loading...</p>';
  try {
    await fetchPortfolio();
    let h = "";

    // Stocks
    h += '<h3 style="color:#e94560; margin-bottom:12px;">Stocks (Moomoo)</h3>';
    if (!currentPortfolio.stocks.positions.length) h += '<p style="color:#8b949e;">No stocks</p>';
    for (const p of currentPortfolio.stocks.positions) {
      const tc = p.batches.reduce((s,b) => s + b.shares*b.cost_price, 0);
      const ts = p.batches.reduce((s,b) => s + b.shares, 0);
      const avg = ts > 0 ? (tc/ts).toFixed(2) : "0";
      h += `<div class="holding-card"><div class="header"><span class="symbol">${p.symbol} <span style="color:#8b949e;font-weight:400;font-size:13px;">${p.name}</span></span><button class="btn-sm" onclick="removeStock('${p.symbol}')">Remove</button></div><div class="detail">${p.shares} shares | Avg: $${avg} | ${p.batches.length} batch(es)</div></div>`;
    }

    // Gold
    h += '<h3 style="color:#f1c40f; margin:20px 0 12px;">Gold (Alipay)</h3>';
    if (!currentPortfolio.gold.positions.length) h += '<p style="color:#8b949e;">No gold</p>';
    for (const p of currentPortfolio.gold.positions) {
      const tg = p.batches.reduce((s,b) => s + (b.grams||b.grams_approx||0), 0);
      const tc = p.batches.reduce((s,b) => { const g = b.grams||b.grams_approx||0; return s+g*b.cost_per_gram; }, 0);
      const avg = tg > 0 ? (tc/tg).toFixed(2) : "0";
      const safeName = p.name.replace(/'/g, "\\'");
      h += `<div class="holding-card"><div class="header"><span class="symbol">${p.name}</span><button class="btn-sm" onclick="removeGold('${safeName}')">Remove</button></div><div class="detail">${p.grams.toFixed(4)}g | Avg: ¥${avg}/g | ${p.batches.length} batch(es)</div></div>`;
    }

    // Cash
    h += '<h3 style="color:#3fb950; margin:20px 0 12px;">Cash</h3>';
    const cny = currentPortfolio.cash.CNY || 0;
    const sgd = currentPortfolio.cash.SGD || 0;
    h += `<div class="holding-card">
      <div class="detail">CNY: ¥${cny}</div>
      <div class="cash-row"><input type="number" id="cash-cny-input" step="0.01" value="${cny}" placeholder="CNY"><button onclick="updateCash('CNY')">Update CNY</button></div>
      <div class="detail" style="margin-top:8px;">SGD: S$${sgd}</div>
      <div class="cash-row"><input type="number" id="cash-sgd-input" step="0.01" value="${sgd}" placeholder="SGD"><button onclick="updateCash('SGD')">Update SGD</button></div>
    </div>`;

    c.innerHTML = h;
  } catch (e) { c.innerHTML = `<p style="color:#f85149;">Error: ${e.message}</p>`; }
}

// ── Update Cash ───────────────────────────────────────────────────────────
async function updateCash(currency) {
  const input = document.getElementById(`cash-${currency.toLowerCase()}-input`);
  const val = parseFloat(input.value);
  if (isNaN(val) || val < 0) return showToast("Enter a valid amount", "error");
  try {
    await fetchPortfolio();
    const old = currentPortfolio.cash[currency] || 0;
    currentPortfolio.cash[currency] = val;
    await savePortfolio(`Update cash: ${currency} ${old} -> ${val}`);
    showToast(`${currency} updated to ${val}`);
    loadPortfolio();
  } catch (e) { showToast(`Error: ${e.message}`, "error"); }
}

// ── Remove ────────────────────────────────────────────────────────────────
async function removeStock(symbol) {
  if (!confirm(`Remove all ${symbol} positions?`)) return;
  try {
    await fetchPortfolio();
    currentPortfolio.stocks.positions = currentPortfolio.stocks.positions.filter(p => p.symbol !== symbol);
    await savePortfolio(`Remove stock: ${symbol}`);
    showToast(`Removed ${symbol}`); loadPortfolio();
  } catch (e) { showToast(`Error: ${e.message}`, "error"); }
}

async function removeGold(name) {
  if (!confirm(`Remove "${name}"?`)) return;
  try {
    await fetchPortfolio();
    currentPortfolio.gold.positions = currentPortfolio.gold.positions.filter(p => p.name !== name);
    currentPortfolio.gold.total_grams = parseFloat(currentPortfolio.gold.positions.reduce((s,p) => s + p.grams, 0).toFixed(6));
    await savePortfolio(`Remove gold: ${name}`);
    showToast(`Removed ${name}`); loadPortfolio();
  } catch (e) { showToast(`Error: ${e.message}`, "error"); }
}

// ── Charts ────────────────────────────────────────────────────────────────
async function loadCharts() {
  const btn = document.getElementById("btn-load-charts");
  const area = document.getElementById("charts-area");
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>Generating charts...';
  area.innerHTML = '<p style="color:#8b949e;">Triggering workflow...</p>';

  try {
    // Trigger the weekly report workflow
    const dispatchResp = await fetch(`${API_BASE}/actions/workflows/weekly_report.yml/dispatches`, {
      method: "POST",
      headers: { Authorization: `token ${getToken()}`, "Content-Type": "application/json" },
      body: JSON.stringify({ ref: "main" })
    });

    if (!dispatchResp.ok) {
      // Fallback: just load history.json and show text summary
      throw new Error("Cannot trigger workflow, loading history instead...");
    }

    area.innerHTML = '<p style="color:#e3b341;">Workflow triggered! Charts will be generated.<br>This takes ~60s. Check WeChat for the report, or come back and click again to see if chart images are ready.</p>';

    // Try to load existing chart images from repo
    setTimeout(async () => {
      await tryLoadChartImages(area);
    }, 3000);

  } catch (e) {
    // Fallback: show latest snapshot
    await renderLatestSnapshot(area, "");
  } finally {
    btn.disabled = false; btn.textContent = "Load Weekly Charts";
  }
}

async function tryLoadChartImages(area) {
  try {
    let html = area.innerHTML;

    // Load chart images via GitHub API (works with private repos)
    for (const [title, color, file] of [
      ["Stock P&L Trend", "#e94560", "chart_stocks.png"],
      ["Gold P&L Trend", "#f1c40f", "chart_gold.png"]
    ]) {
      try {
        const resp = await fetch(`${API_BASE}/contents/${file}`, {
          headers: { Authorization: `token ${getToken()}`, Accept: "application/vnd.github.v3.json" }
        });
        if (resp.ok) {
          const data = await resp.json();
          html += `<h3 style="color:${color};margin:16px 0 8px;">${title}</h3>`;
          html += `<img src="data:image/png;base64,${data.content.replace(/\s/g, "")}" style="max-width:100%;border-radius:8px;" />`;
        }
      } catch {}
    }

    // Show latest snapshot from history
    await renderLatestSnapshot(area, html);
  } catch {}
}

async function renderLatestSnapshot(area, prefixHtml) {
  let html = prefixHtml || "";
  try {
    const histB64 = await fetchFileBase64("history.json");
    if (!histB64) { if (html) area.innerHTML = html; return; }
    const history = JSON.parse(b64DecodeUTF8(histB64));
    if (!history.length) { if (html) area.innerHTML = html; return; }

    const latest = history[history.length - 1];

    // Filter: only show stocks that are still in current portfolio
    const heldSymbols = currentPortfolio
      ? new Set(currentPortfolio.stocks.positions.map(p => p.symbol))
      : null;

    html += `<h3 style="color:#58a6ff;margin:16px 0 8px;">Latest Snapshot (${latest.date})</h3>`;
    html += '<div class="holding-card">';
    if (latest.stocks) {
      for (const [sym, data] of Object.entries(latest.stocks)) {
        if (heldSymbols && !heldSymbols.has(sym)) continue;
        const d = data;
        const color = d.pnl_cny >= 0 ? "#3fb950" : "#f85149";
        html += `<div class="detail" style="color:${color};">${sym}: ¥${d.pnl_cny?.toFixed(2)} (${d.pnl_pct?.toFixed(2)}%)</div>`;
      }
    }
    html += `<div class="detail">Stock total: ¥${latest.stock_total_pnl_cny?.toFixed(2)}</div>`;
    html += `<div class="detail">Gold total: ¥${latest.gold_total_pnl_cny?.toFixed(2)}</div>`;
    html += '</div>';
  } catch {}
  area.innerHTML = html;
}
</script>
