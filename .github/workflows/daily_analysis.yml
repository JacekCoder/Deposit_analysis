name: Daily Deposit Analysis

on:
  schedule:
    # 8:00 AM Beijing Time (UTC+8) = 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      profile:
        description: "Profile to run (default, mapeiying, or all)"
        required: false
        default: "all"

jobs:
  analyze:
    name: Record Daily Data (${{ matrix.profile }})
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        profile: ${{ fromJSON(github.event.inputs.profile == 'all' && '["default","mapeiying"]' || github.event_name == 'schedule' && '["default","mapeiying"]' || format('["{0}"]', github.event.inputs.profile)) }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Record daily snapshot (no notification)
        run: python deposit_analysis.py --profile=${{ matrix.profile }} --no-notify

      - name: Commit history data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add history*.json
          git diff --cached --quiet || git commit -m "Update daily P&L history (${{ matrix.profile }}) [skip ci]"
          git pull --rebase
          git push
