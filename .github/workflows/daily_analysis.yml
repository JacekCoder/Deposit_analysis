name: Daily Deposit Analysis

on:
  schedule:
    # 8:00 AM Beijing Time (UTC+8) = 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch:  # Allow manual triggering for testing

jobs:
  analyze:
    name: Run Portfolio Analysis & Notify WeChat
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to commit history.json

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run deposit analysis and send WeChat notification
        env:
          WECHAT_WEBHOOK: ${{ secrets.WECHAT_WEBHOOK }}
        run: python deposit_analysis.py

      - name: Commit history data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add history.json
          git diff --cached --quiet || git commit -m "Update daily P&L history [skip ci]"
          git push
