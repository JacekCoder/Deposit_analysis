name: Weekly P&L Report with Charts

on:
  schedule:
    # Saturday 8:00 AM Beijing Time (UTC+8) = Saturday 00:00 UTC
    - cron: "0 0 * * 6"
  workflow_dispatch:
    inputs:
      profile:
        description: "Profile to run (default, mapeiying, or all)"
        required: false
        default: "all"

jobs:
  weekly-report:
    name: Generate Weekly Charts & Send to WeChat (${{ matrix.profile }})
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        profile: ${{ fromJSON(github.event.inputs.profile == 'all' && '["default","mapeiying"]' || github.event_name == 'schedule' && '["default","mapeiying"]' || format('["{0}"]', github.event.inputs.profile)) }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run weekly report with charts
        env:
          WECHAT_WEBHOOK: ${{ secrets.WECHAT_WEBHOOK }}
        run: python deposit_analysis.py --weekly --profile=${{ matrix.profile }}

      - name: Commit history data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add history*.json chart*.png
          git diff --cached --quiet || git commit -m "Update weekly P&L history & charts (${{ matrix.profile }}) [skip ci]"
          git pull --rebase
          git push
