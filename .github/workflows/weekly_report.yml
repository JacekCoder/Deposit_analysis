name: Weekly P&L Report with Charts

on:
  schedule:
    # Saturday 8:00 AM Beijing Time (UTC+8) = Saturday 00:00 UTC
    - cron: "0 0 * * 6"
  workflow_dispatch:  # Allow manual triggering for testing

jobs:
  weekly-report:
    name: Generate Weekly Charts & Send to WeChat
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run weekly report with charts
        env:
          WECHAT_WEBHOOK: ${{ secrets.WECHAT_WEBHOOK }}
        run: python deposit_analysis.py --weekly

      - name: Commit history data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add history.json chart_*.png
          git diff --cached --quiet || git commit -m "Update weekly P&L history & charts [skip ci]"
          git push
